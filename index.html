<!DOCTYPE html>
<html>
<head>
    <title>Carton Loading System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>3D Carton Loading System</h1>

<div class="container">

    <h2>Container Details</h2>

    <input type="number" id="cLength" placeholder="Container Length">
    <input type="number" id="cWidth" placeholder="Container Width">
    <input type="number" id="cHeight" placeholder="Container Height">

    <h2>Carton Details</h2>

    <input type="number" id="boxLength" placeholder="Carton Length">
    <input type="number" id="boxWidth" placeholder="Carton Width">
    <input type="number" id="boxHeight" placeholder="Carton Height">
    <input type="number" id="quantity" placeholder="Quantity">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
