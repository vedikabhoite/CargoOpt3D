<!DOCTYPE html>
<html>

<head>
    <title>3D Container Visualization</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();

const camera =
    new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

const renderer =
    new THREE.WebGLRenderer({
        antialias: true
    });

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

// ---------------------
// Orbit Controls
// ---------------------

const controls =
    new THREE.OrbitControls(
        camera,
        renderer.domElement
    );

// ---------------------
// Container
// ---------------------

const geometry =
    new THREE.BoxGeometry(
        20,
        8,
        8
    );

const material =
    new THREE.MeshBasicMaterial({
        wireframe: true,
        transparent: true,
        opacity: 0.5
    });

const container =
    new THREE.Mesh(
        geometry,
        material
    );

scene.add(container);

// ---------------------
// Sample Placement Data
// ---------------------

const placements = [

    {x:0,y:0,z:0},
    {x:2,y:0,z:0},
    {x:4,y:0,z:0},
    {x:6,y:0,z:0},
    {x:8,y:0,z:0},

    {x:0,y:2,z:0},
    {x:2,y:2,z:0},
    {x:4,y:2,z:0},
    {x:6,y:2,z:0},

    {x:0,y:4,z:0},
    {x:2,y:4,z:0}

];

// ---------------------
// Cartons
// ---------------------

const cartonGeometry =
    new THREE.BoxGeometry(
        1.5,
        1.5,
        1.5
    );

const cartonMaterial =
    new THREE.MeshNormalMaterial();

placements.forEach(item => {

    const box =
        new THREE.Mesh(
            cartonGeometry,
            cartonMaterial
        );

    box.position.set(
        item.x - 5,
        item.y - 3,
        item.z - 3
    );

    scene.add(box);
});

// ---------------------
// Camera Position
// ---------------------

camera.position.set(
    15,
    10,
    20
);

// ---------------------
// Window Resize
// ---------------------

window.addEventListener(
    "resize",
    () => {

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

// ---------------------
// Animation
// ---------------------

function animate() {

    requestAnimationFrame(
        animate
    );

    controls.update();

    renderer.render(
        scene,
        camera
    );
}

animate();

</script>

</body>
</html>
